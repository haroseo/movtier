<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MindWeb Flashcards</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<style>
  :root{
    --bg:#fafaf9; --panel:#ffffff; --border:#e8e6e1; --text:#1f1d1a; --muted:#8b8778;
    --violet:#6c5ce7; --violet-bg:#e9e5fb; --gold:#d89a3d; --gold-bg:#faf0dd;
    --green:#38a06b; --green-bg:#e0f3e8; --red:#d45454; --red-bg:#fbe4e4;
    --font: "Pretendard","Inter",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  [data-theme="dark"]{ --bg:#17171b; --panel:#1e1e23; --border:#2c2c34; --text:#eeecee; --muted:#8f8d9b;
    --violet-bg:#2a2540; --gold-bg:#332a17; --green-bg:#163325; --red-bg:#33201f; }
  [data-theme="mono"]{ --bg:#ffffff; --panel:#f2f2f2; --border:#d8d8d8; --text:#111111; --muted:#767676;
    --violet:#111111; --violet-bg:#eaeaea; --gold:#444444; --gold-bg:#eeeeee; --green:#222; --green-bg:#e9e9e9; --red:#555; --red-bg:#e5e5e5;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;}
  #topbar{height:72px;min-height:72px;border-bottom:1px solid var(--border);background:var(--panel);
    display:flex;align-items:center;gap:14px;padding:0 28px;}
  .brand{font-weight:700;color:var(--violet);display:flex;align-items:center;gap:8px;white-space:nowrap;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);}
  .spacer{flex:1;}
  .pill{display:flex;align-items:center;gap:6px;padding:9px 15px;border-radius:999px;font-size:12.5px;font-weight:600;
    cursor:pointer;border:1px solid transparent;white-space:nowrap;font-family:var(--font);}
  .pill.violet{background:var(--violet-bg);color:var(--violet);}
  .pill.gold{background:var(--gold-bg);color:var(--gold);}
  .pill.ghost{background:var(--bg);color:var(--text);border-color:var(--border);}
  #settingsBtn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--panel);cursor:pointer;}

  #stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;position:relative;}
  #cardWrap{width:560px;max-width:88vw;height:340px;perspective:1200px;}
  #card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.2,.8,.3,1);cursor:pointer;}
  #card.flipped{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--border);border-radius:20px;
    background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;}
  .face.back{transform:rotateY(180deg);}
  .tag{padding:6px 14px;border-radius:999px;background:var(--gold-bg);color:var(--gold);font-size:11.5px;font-weight:700;}
  .word{font-size:38px;font-weight:800;text-align:center;}
  .meta{font-size:13px;color:var(--muted);}
  .hint{font-size:11.5px;color:var(--muted);margin-top:6px;}
  .meaning{font-size:24px;font-weight:700;text-align:center;}
  .example{font-size:13px;color:var(--muted);text-align:center;max-width:420px;}

  #answerRow{display:flex;gap:16px;width:560px;max-width:88vw;}
  .bigbtn{flex:1;padding:16px;border-radius:12px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font);}
  .bigbtn.red{background:var(--red-bg);color:var(--red);}
  .bigbtn.green{background:var(--green-bg);color:var(--green);}

  #settingsPanel{position:absolute;top:80px;right:28px;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none;z-index:50;width:230px;}
  #settingsPanel.show{display:block;}
  #settingsPanel h4{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .swatchRow{display:flex;gap:8px;margin-bottom:16px;}
  .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:var(--text);}
  .themeRow{display:flex;gap:6px;}
  .themeRow button{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--bg);
    color:var(--text);cursor:pointer;font-size:11px;font-family:var(--font);}
  .themeRow button.active{background:var(--violet);color:#fff;border-color:var(--violet);}

  #ocrOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;}
  #ocrOverlay.show{display:flex;}
  #ocrBox{background:var(--panel);border-radius:16px;padding:28px;width:420px;text-align:center;}
  #ocrBox input{margin:14px 0;}
  #ocrStatus{font-size:12.5px;color:var(--muted);margin-top:10px;}
  #ocrBox button.cancel{margin-top:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--font);}
  #ocrBox .tip{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5;}
</style>
</head>
<body data-theme="light">

<div id="topbar">
  <div class="brand"><span class="dot"></span>암기 카드</div>
  <div class="spacer"></div>
  <div class="pill violet" id="statsPill">오늘 0개 · 정답률 —</div>
  <button class="pill gold" id="ocrBtn">📷 사진으로 단어 추가</button>
  <button id="settingsBtn">⚙</button>
</div>

<div id="stage">
  <div id="cardWrap">
    <div id="card">
      <div class="face front">
        <div class="tag" id="frontTag">영단어 · Day 1</div>
        <div class="word" id="frontWord">serendipity</div>
        <div class="meta" id="frontMeta">/ˌser.ənˈdɪp.ə.ti/ · 명사</div>
        <div class="hint">카드를 클릭하면 뜻이 보여요</div>
      </div>
      <div class="face back">
        <div class="meaning" id="backMeaning">뜻밖의 좋은 발견, 우연한 행운</div>
        <div class="example" id="backExample">예문: Finding this cafe was pure serendipity.</div>
      </div>
    </div>
  </div>
  <div id="answerRow">
    <button class="bigbtn red" id="dontKnowBtn">😵 몰라요</button>
    <button class="bigbtn green" id="knowBtn">😊 알아요</button>
  </div>
</div>

<div id="settingsPanel">
  <h4>테마</h4>
  <div class="themeRow">
    <button data-theme-opt="light" class="active">라이트</button>
    <button data-theme-opt="dark">다크</button>
    <button data-theme-opt="mono">흑백</button>
  </div>
  <h4 style="margin-top:16px;">강조 색상</h4>
  <div class="swatchRow" id="swatchRow"></div>
</div>

<div id="ocrOverlay">
  <div id="ocrBox">
    <div style="font-weight:700;margin-bottom:6px;">📷 단어장 사진 읽기</div>
    <div style="font-size:12.5px;color:var(--muted);">단어장이나 교재 사진을 올리면 OCR로 텍스트를 읽어 자동으로 카드로 만들어요.</div>
    <input type="file" id="ocrFile" accept="image/*">
    <div class="tip">"word - 뜻" 또는 "word: 뜻" 형식의 줄은 자동으로 단어/뜻이 나뉘어요.</div>
    <div id="ocrStatus"></div>
    <button class="cancel" id="ocrCancel">닫기</button>
  </div>
</div>

<script>
let deck = [
  {word:"serendipity", pron:"/ˌser.ənˈdɪp.ə.ti/", pos:"명사", meaning:"뜻밖의 좋은 발견, 우연한 행운", example:"Finding this cafe was pure serendipity."},
  {word:"ubiquitous", pron:"/juːˈbɪk.wɪ.təs/", pos:"형용사", meaning:"어디에나 있는, 편재하는", example:"Smartphones are ubiquitous now."},
  {word:"resilient", pron:"/rɪˈzɪl.i.ənt/", pos:"형용사", meaning:"회복력 있는, 탄력적인", example:"She remained resilient after setbacks."},
];
let cur = 0, todayCount = 0, correctCount = 0;

const card=document.getElementById("card");
function renderCard(){
  const c = deck[cur % deck.length];
  card.classList.remove("flipped");
  document.getElementById("frontTag").textContent = `영단어 · ${cur+1}/${deck.length}`;
  document.getElementById("frontWord").textContent = c.word;
  document.getElementById("frontMeta").textContent = `${c.pron||""} ${c.pos?"· "+c.pos:""}`;
  document.getElementById("backMeaning").textContent = c.meaning || "뜻을 아직 몰라요 — 직접 입력해보세요";
  document.getElementById("backExample").textContent = c.example ? "예문: "+c.example : "";
}
card.onclick=()=>card.classList.toggle("flipped");

function nextCard(known){
  todayCount++;
  if(known) correctCount++;
  document.getElementById("statsPill").textContent = `오늘 ${todayCount}개 · 정답률 ${Math.round(correctCount/todayCount*100)}%`;
  if(!known){
    // requeue this word a few slots later (simple spaced repetition)
    const c = deck.splice(cur%deck.length,1)[0];
    const insertAt = Math.min(deck.length, (cur%deck.length)+3);
    deck.splice(insertAt,0,c);
  } else {
    cur++;
  }
  renderCard();
}
document.getElementById("knowBtn").onclick=()=>nextCard(true);
document.getElementById("dontKnowBtn").onclick=()=>nextCard(false);

// settings
const settingsBtn=document.getElementById("settingsBtn");
const settingsPanel=document.getElementById("settingsPanel");
settingsBtn.onclick=()=>settingsPanel.classList.toggle("show");
document.addEventListener("click",e=>{ if(!settingsPanel.contains(e.target) && e.target!==settingsBtn) settingsPanel.classList.remove("show"); });
document.querySelectorAll("[data-theme-opt]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-theme-opt]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.body.dataset.theme=btn.dataset.themeOpt;
  };
});
const accents=[["#6c5ce7","#e9e5fb"],["#2563eb","#dbeafe"],["#d84f6b","#fbe3e8"],["#0f9d58","#dcf3e5"],["#d89a3d","#faf0dd"]];
const swatchRow=document.getElementById("swatchRow");
accents.forEach((c,i)=>{
  const s=document.createElement("div"); s.className="swatch"+(i===0?" sel":"");
  s.style.background=c[0];
  s.onclick=()=>{
    document.querySelectorAll(".swatch").forEach(x=>x.classList.remove("sel")); s.classList.add("sel");
    document.documentElement.style.setProperty("--violet",c[0]);
    document.documentElement.style.setProperty("--violet-bg",c[1]);
  };
  swatchRow.appendChild(s);
});

// OCR word capture (client-side OCR engine, no AI/LLM)
const ocrBtn=document.getElementById("ocrBtn");
const ocrOverlay=document.getElementById("ocrOverlay");
ocrBtn.onclick=()=>ocrOverlay.classList.add("show");
document.getElementById("ocrCancel").onclick=()=>ocrOverlay.classList.remove("show");
document.getElementById("ocrFile").addEventListener("change", async (e)=>{
  const file=e.target.files[0];
  if(!file) return;
  const status=document.getElementById("ocrStatus");
  status.textContent="이미지에서 단어를 읽는 중…";
  try{
    const {data:{text}} = await Tesseract.recognize(file, 'eng+kor', {
      logger: m => { if(m.status==='recognizing text') status.textContent = `인식 중… ${Math.round(m.progress*100)}%`; }
    });
    const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
    let added = 0;
    lines.forEach(line=>{
      const sep = line.includes(" - ") ? " - " : line.includes(":") ? ":" : null;
      if(sep){
        const [w,m] = line.split(sep);
        if(w && m){ deck.push({word:w.trim(), pron:"", pos:"", meaning:m.trim(), example:""}); added++; }
      } else if(/^[A-Za-z\-']{2,}$/.test(line)){
        deck.push({word:line, pron:"", pos:"", meaning:"뜻 입력 필요", example:""});
        added++;
      }
    });
    status.textContent = added>0 ? `${added}개 단어를 카드로 추가했어요!` : "단어를 찾지 못했어요. 더 선명한 사진으로 시도해보세요.";
    if(added>0) setTimeout(()=>{ ocrOverlay.classList.remove("show"); renderCard(); },900);
  }catch(err){
    status.textContent="이미지를 읽지 못했어요.";
  }
});

renderCard();
</script>
</body>
</html>
