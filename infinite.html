<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MindWeb Infinite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root{
    --bg:#fafaf9; --panel:#ffffff; --border:#e8e6e1; --text:#1f1d1a; --muted:#8b8778;
    --violet:#6c5ce7; --violet-bg:#e9e5fb; --gold:#d89a3d; --gold-bg:#faf0dd; --red:#d45454; --red-bg:#fbe4e4;
    --font: "Pretendard","Inter",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  [data-theme="dark"]{ --bg:#17171b; --panel:#1e1e23; --border:#2c2c34; --text:#eeecee; --muted:#8f8d9b; --violet-bg:#2a2540; --gold-bg:#332a17; --red-bg:#3a2222; }
  [data-theme="mono"]{ --bg:#ffffff; --panel:#f2f2f2; --border:#d8d8d8; --text:#111111; --muted:#767676;
    --violet:#111111; --violet-bg:#eaeaea; --gold:#444444; --gold-bg:#eeeeee; --red:#555; --red-bg:#e5e5e5; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;}
  ::-webkit-scrollbar{width:8px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  #topbar{height:64px;min-height:64px;border-bottom:1px solid var(--border);background:var(--panel);
    display:flex;align-items:center;gap:12px;padding:0 20px;}
  .brand{font-weight:700;color:var(--violet);display:flex;align-items:center;gap:8px;white-space:nowrap;font-size:14px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);}
  #kwInput{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13.5px;
    background:var(--bg);color:var(--text);font-family:var(--font);outline:none;}
  .pill{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;font-size:12px;font-weight:600;
    cursor:pointer;border:1px solid transparent;white-space:nowrap;font-family:var(--font);}
  .pill.violet{background:var(--violet-bg);color:var(--violet);}
  .pill.gold{background:var(--gold-bg);color:var(--gold);}
  .pill.ghost{background:var(--bg);color:var(--text);border-color:var(--border);}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;white-space:nowrap;}
  .switch{width:34px;height:20px;border-radius:10px;background:var(--border);position:relative;cursor:pointer;transition:.2s;}
  .switch.on{background:var(--violet);}
  .switch .knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:.2s;}
  .switch.on .knob{left:16px;}
  #settingsBtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--panel);cursor:pointer;}

  #body{flex:1;display:flex;min-height:0;position:relative;}
  #canvasWrap{flex:1;position:relative;}
  canvas{width:100%;height:100%;display:block;cursor:grab;}
  #statusBar{position:absolute;bottom:20px;left:20px;right:20px;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 14px rgba(0,0,0,.06);}
  #statusText{font-size:12.5px;color:var(--text);flex:1;display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .spinner{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--violet);
    animation:spin .8s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #progressWrap{width:180px;flex-shrink:0;}
  #progressTrack{width:100%;height:6px;border-radius:3px;background:var(--border);overflow:hidden;}
  #progressFill{height:100%;background:var(--violet);width:0%;transition:width .3s;}
  #progressLabel{font-size:10.5px;color:var(--muted);margin-top:4px;text-align:right;}
  #activityToggle{font-size:11.5px;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;}
  #activityLog{position:absolute;bottom:66px;left:20px;right:20px;max-height:180px;overflow-y:auto;
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:none;
    box-shadow:0 4px 14px rgba(0,0,0,.06);}
  #activityLog.show{display:block;}
  .logItem{font-size:11.5px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;}
  .logItem:last-child{border-bottom:none;}
  .logItem b{color:var(--text);font-weight:600;}
  #emptyHint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:13.5px;text-align:center;pointer-events:none;padding:0 20px;}

  #ctxMenu{position:fixed;z-index:200;background:var(--panel);border:1px solid var(--border);border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.16);padding:6px;display:none;min-width:190px;}
  #ctxMenu.show{display:block;}
  #ctxMenu .ctxItem{padding:9px 12px;border-radius:7px;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text);}
  #ctxMenu .ctxItem:hover{background:var(--violet-bg);color:var(--violet);}
  #ctxMenu .ctxItem.danger:hover{background:var(--red-bg);color:var(--red);}
  #ctxMenu .ctxSep{height:1px;background:var(--border);margin:4px 2px;}

  #shortcutPanel{position:absolute;top:70px;right:20px;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none;z-index:50;width:250px;}
  #shortcutPanel.show{display:block;}
  #shortcutPanel h4{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .scRow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;}
  .scRow kbd{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-family:var(--font);font-size:11px;}

  #queuePanel{width:0;overflow:hidden;border-right:1px solid var(--border);background:var(--panel);
    transition:width .2s;display:flex;flex-direction:column;}
  #queuePanel.show{width:280px;}
  #queuePanel .inner{width:280px;padding:18px 16px;display:flex;flex-direction:column;gap:14px;height:100%;overflow-y:auto;}
  .h{font-size:12px;font-weight:700;color:var(--muted);}
  #excludeInput{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;
    background:var(--bg);color:var(--text);font-family:var(--font);outline:none;}
  #excludeChips{display:flex;flex-wrap:wrap;gap:6px;}
  .exChip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;background:var(--red-bg);color:var(--red);font-size:11px;font-weight:600;}
  .exChip .x{cursor:pointer;}
  #queueList{display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto;}
  .qItem{padding:7px 9px;border-radius:7px;background:var(--bg);border:1px solid var(--border);font-size:11.5px;
    display:flex;justify-content:space-between;align-items:center;gap:6px;}
  .qItem .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .qItem .n{color:var(--muted);font-size:10px;}

  #detailPanel{width:0;overflow:hidden;border-left:1px solid var(--border);background:var(--panel);
    transition:width .2s;}
  #detailPanel.show{width:320px;}
  #detailPanel .inner{width:320px;padding:22px 18px;display:flex;flex-direction:column;gap:12px;height:100%;overflow-y:auto;}
  #detailPanel .title{font-size:18px;font-weight:800;}
  #detailPanel .tag{align-self:flex-start;padding:4px 10px;border-radius:999px;font-size:10.5px;font-weight:700;}
  #detailPanel .tag.core{background:var(--violet-bg);color:var(--violet);}
  #detailPanel .tag.ref{background:var(--gold-bg);color:var(--gold);}
  #detailPanel .extract{font-size:13px;line-height:1.7;color:var(--text);}
  #detailPanel .source{font-size:11.5px;color:var(--muted);}
  #detailPanel .source a{color:var(--violet);}
  #detailPanel .reportBtn{padding:8px 12px;border-radius:8px;background:var(--red-bg);color:var(--red);
    border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}
  #correctionBox{display:none;flex-direction:column;gap:8px;}
  #correctionBox.show{display:flex;}
  #correctionBox textarea{width:100%;height:70px;border:1px solid var(--border);border-radius:8px;padding:8px;
    font-family:var(--font);font-size:12.5px;background:var(--bg);color:var(--text);resize:none;}
  #correctionBox button{align-self:flex-end;background:var(--violet);color:#fff;border:none;border-radius:6px;
    padding:6px 12px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:var(--font);}
  .reportedBadge{background:var(--red-bg);color:var(--red);padding:6px 10px;border-radius:8px;font-size:11.5px;font-weight:700;}
  #closeDetail{align-self:flex-end;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;}

  #settingsPanel{position:absolute;top:70px;right:20px;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none;z-index:50;width:230px;}
  #settingsPanel.show{display:block;}
  #settingsPanel h4{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .swatchRow{display:flex;gap:8px;margin-bottom:16px;}
  .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:var(--text);}
  .themeRow{display:flex;gap:6px;margin-bottom:14px;}
  .themeRow button{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--bg);
    color:var(--text);cursor:pointer;font-size:11px;font-family:var(--font);}
  .themeRow button.active{background:var(--violet);color:#fff;border-color:var(--violet);}
</style>
</head>
<body data-theme="light">

<div id="topbar">
  <div class="brand"><span class="dot"></span>무한증식</div>
  <button class="pill ghost" id="queueBtn">📋 탐색 대기 <span id="queueBadge">0</span></button>
  <input id="kwInput" placeholder="키워드를 입력하면 위키백과를 따라 최대 1만 개까지 확장돼요… (Enter)">
  <div class="toggle">자동 확장 <div class="switch on" id="autoSwitch"><div class="knob"></div></div></div>
  <button class="pill gold" id="pauseBtn">⏸ 일시정지</button>
  <button class="pill ghost" id="shortcutBtn">⌨ 단축키</button>
  <button id="settingsBtn">⚙</button>
</div>

<div id="body">
  <div id="queuePanel">
    <div class="inner">
      <div class="h">🚫 제외 범위</div>
      <input id="excludeInput" placeholder="제외할 키워드 입력 후 Enter">
      <div id="excludeChips"></div>
      <div class="h" style="margin-top:6px;">탐색 대기 목록</div>
      <div id="queueList"></div>
    </div>
  </div>

  <div id="canvasWrap">
    <canvas id="canvas"></canvas>
    <div id="emptyHint">키워드를 입력하면 위키백과를 따라 자동으로 그래프가 자라나요.<br>노드를 클릭하면 요약·출처를 볼 수 있어요.</div>
    <div id="activityLog"></div>
    <div id="statusBar">
      <div id="statusText"><span class="spinner" id="spinner" style="display:none;"></span><span id="statusMsg">대기 중</span></div>
      <div id="activityToggle">📜 최근 활동</div>
      <div id="progressWrap">
        <div id="progressTrack"><div id="progressFill"></div></div>
        <div id="progressLabel">0 / 10,000 노드</div>
      </div>
    </div>
  </div>

  <div id="detailPanel">
    <div class="inner">
      <button id="closeDetail">✕</button>
      <span class="tag" id="detailTag">CORE</span>
      <div class="title" id="detailTitle"></div>
      <div class="extract" id="detailExtract">불러오는 중…</div>
      <div class="source" id="detailSource"></div>
      <div id="reportArea">
        <button class="reportBtn" id="reportBtn">🚩 이 정보가 틀렸어요 — 신고하기</button>
        <div id="correctionBox">
          <textarea id="correctionText" placeholder="정확한 정보를 입력해주세요. 다음부터는 이 내용이 대신 표시돼요."></textarea>
          <button id="saveCorrection">저장</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="settingsPanel">
  <h4>테마</h4>
  <div class="themeRow">
    <button data-theme-opt="light" class="active">라이트</button>
    <button data-theme-opt="dark">다크</button>
    <button data-theme-opt="mono">흑백</button>
  </div>
  <h4>강조 색상</h4>
  <div class="swatchRow" id="swatchRow"></div>
  <h4>확장 속도</h4>
  <input type="range" id="speedSlider" min="300" max="3000" value="900" style="width:100%;">
</div>

<div id="shortcutPanel">
  <h4>⌨ 단축키</h4>
  <div class="scRow"><span>선택 노드 삭제</span><kbd>Delete</kbd></div>
  <div class="scRow"><span>패널 닫기 / 선택 해제</span><kbd>Esc</kbd></div>
  <div class="scRow"><span>키워드 입력창 포커스</span><kbd>Ctrl/⌘ F</kbd></div>
  <div class="scRow"><span>확대</span><kbd>+</kbd></div>
  <div class="scRow"><span>축소</span><kbd>-</kbd></div>
  <div class="scRow"><span>보기 초기화</span><kbd>0</kbd></div>
  <div class="scRow"><span>노드 우클릭</span><kbd>메뉴 열기</kbd></div>
  <div class="scRow"><span>노드 3연속 클릭</span><kbd>메뉴 열기</kbd></div>
</div>

<div id="ctxMenu">
  <div class="ctxItem" id="ctxFindMore">🔎 여기서 더 찾기</div>
  <div class="ctxItem" id="ctxEdit">✏️ 수정 요청하기</div>
  <div class="ctxItem" id="ctxReport">🚩 오류 신고하기</div>
  <div class="ctxSep"></div>
  <div class="ctxItem danger" id="ctxDelete">🗑 노드 삭제</div>
</div>

<script>
/* ---------- storage: reports / corrections / exclusions persist across sessions ---------- */
const LS_REPORTS = "mindweb_infinite_reports";
const LS_EXCLUDE  = "mindweb_infinite_exclusions";
function loadReports(){ try{ return JSON.parse(localStorage.getItem(LS_REPORTS)||"{}"); }catch(e){ return {}; } }
function saveReports(r){ localStorage.setItem(LS_REPORTS, JSON.stringify(r)); }
function loadExclusions(){ try{ return JSON.parse(localStorage.getItem(LS_EXCLUDE)||"[]"); }catch(e){ return []; } }
function saveExclusions(a){ localStorage.setItem(LS_EXCLUDE, JSON.stringify(a)); }
let reports = loadReports();
let exclusions = loadExclusions();

const STOP = new Set(["그리고","그런","이런","것","수","등","의","을","를","이","가","은","는","에","와","과","도","로","으로","에서","및","the","and","of","to","in","for","a","an","with","on"]);
function keywordsOf(str){
  return [...new Set(str.replace(/[,.!?/\\()\[\]{}"'\n]/g," ").split(/\s+/)
    .map(w=>w.trim()).filter(w=>w.length>1 && !STOP.has(w.toLowerCase())))].slice(0,8);
}
function jaccard(a,b){
  const sa=new Set(a.map(x=>x.toLowerCase())), sb=new Set(b.map(x=>x.toLowerCase()));
  if(!sa.size||!sb.size) return 0;
  let inter=0; sa.forEach(x=>{if(sb.has(x))inter++;});
  return inter/new Set([...sa,...sb]).size;
}
function isExcluded(title){
  const low = title.toLowerCase();
  return exclusions.some(term => low.includes(term.toLowerCase()));
}

/* ---------- graph state ---------- */
let nodes=[], links=[], idSeq=0, queue=[], paused=false;
const MAX_NODES = 10000;
let selectedNode = null;
let explored = new Set();       // node ids already expanded at least once
let lastActivityTime = Date.now();
const IDLE_MS = 8000;           // if nothing happens for this long, auto-continue with a related keyword

/* ---------- d3-force physics, canvas rendering (scales to thousands of nodes) ---------- */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let width, height, dpr = Math.min(window.devicePixelRatio||1, 2);
let transform = d3.zoomIdentity;

function resize(){
  const r = document.getElementById("canvasWrap").getBoundingClientRect();
  width = r.width; height = r.height;
  canvas.width = width*dpr; canvas.height = height*dpr;
  canvas.style.width = width+"px"; canvas.style.height = height+"px";
  draw();
}
window.addEventListener("resize", resize);

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(d=>d.ref?42:80).strength(.5))
  .force("charge", d3.forceManyBody().strength(-90).distanceMax(400))
  .force("center", d3.forceCenter())
  .force("collide", d3.forceCollide().radius(d=>d.ref?9:20))
  .alphaDecay(0.02)
  .on("tick", draw);

function colorFor(node, cssVar){
  return getComputedStyle(document.body).getPropertyValue(cssVar).trim();
}
function draw(){
  ctx.save();
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,width,height);
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  const violet = colorFor(null,"--violet"), gold = colorFor(null,"--gold"), red = colorFor(null,"--red"), text = colorFor(null,"--text");
  const showLabels = transform.k > 0.7;

  // links
  ctx.lineWidth = 1/transform.k;
  links.forEach(l=>{
    const s=l.source, t=l.target;
    if(!s.x || !t.x) return;
    ctx.strokeStyle = l.ref ? gold : violet;
    ctx.globalAlpha = l.ref ? 0.35 : 0.22;
    if(l.ref){ ctx.setLineDash([3,3]); } else { ctx.setLineDash([]); }
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(t.x,t.y); ctx.stroke();
  });
  ctx.setLineDash([]); ctx.globalAlpha=1;

  // nodes
  nodes.forEach(n=>{
    if(!n.x) return;
    const r = n.ref ? 6 : 12;
    const isFlagged = reports[n.label] && reports[n.label].reported;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = isFlagged ? "rgba(212,84,84,0.15)" : (n.ref ? gold+"22" : violet+"22");
    ctx.fill();
    ctx.lineWidth = (n===selectedNode ? 2.5 : 1.3)/transform.k;
    ctx.strokeStyle = isFlagged ? red : (n.ref ? gold : violet);
    ctx.stroke();
    if(showLabels || n===selectedNode || !n.ref){
      ctx.fillStyle = text;
      ctx.font = `${n.ref?10:11}px Pretendard, sans-serif`;
      ctx.textAlign = "center";
      const label = n.label.length>12 ? n.label.slice(0,12)+"…" : n.label;
      ctx.fillText(label, n.x, n.y + r + 12);
    }
  });
  ctx.restore();
}

d3.select(canvas).call(
  d3.zoom().scaleExtent([.05,4]).on("zoom", (e)=>{ transform = e.transform; draw(); })
);

function nodeAt(px,py){
  const [gx,gy] = transform.invert([px,py]);
  let best=null, bestD=20;
  for(const n of nodes){
    if(!n.x) continue;
    const d = Math.hypot(n.x-gx, n.y-gy);
    const r = (n.ref?6:12)+6;
    if(d<r && d<bestD){ best=n; bestD=d; }
  }
  return best;
}
let clickTracker = {node:null, count:0, timer:null};
canvas.addEventListener("click", (e)=>{
  const rect = canvas.getBoundingClientRect();
  const n = nodeAt(e.clientX-rect.left, e.clientY-rect.top);
  if(!n) return;
  selectNode(n);
  if(clickTracker.node===n){
    clickTracker.count++;
  } else {
    clickTracker.node=n; clickTracker.count=1;
  }
  clearTimeout(clickTracker.timer);
  clickTracker.timer = setTimeout(()=>{ clickTracker.node=null; clickTracker.count=0; }, 600);
  if(clickTracker.count>=3){
    e.stopPropagation();
    openContextMenu(n, e.clientX, e.clientY);
    clickTracker.count=0; clickTracker.node=null;
  }
});
canvas.addEventListener("contextmenu", (e)=>{
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const n = nodeAt(e.clientX-rect.left, e.clientY-rect.top);
  if(n){ selectNode(n); openContextMenu(n, e.clientX, e.clientY); }
});

/* ---------- status / progress / activity log ---------- */
let activityLog = [];
function setStatus(msg, spinning){
  document.getElementById("statusMsg").textContent = msg;
  document.getElementById("spinner").style.display = spinning ? "inline-block" : "none";
}
function updateProgress(){
  const pct = Math.min(100, (nodes.length/MAX_NODES*100));
  document.getElementById("progressFill").style.width = pct.toFixed(2)+"%";
  document.getElementById("progressLabel").textContent = `${nodes.length.toLocaleString()} / ${MAX_NODES.toLocaleString()} 노드 (${pct.toFixed(1)}%)`;
}
function logActivity(msg){
  activityLog.unshift({msg, t: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});
  activityLog = activityLog.slice(0,40);
  renderActivityLog();
}
function renderActivityLog(){
  const box = document.getElementById("activityLog");
  box.innerHTML = activityLog.map(a=>`<div class="logItem"><b>${a.msg}</b><span>${a.t}</span></div>`).join("") || `<div class="logItem">아직 활동이 없어요.</div>`;
}
document.getElementById("activityToggle").onclick=()=>{
  document.getElementById("activityLog").classList.toggle("show");
};

/* ---------- node creation ---------- */
function addNode(label, ref, parentId){
  if(nodes.length>=MAX_NODES) return null;
  if(isExcluded(label)) return null;
  if(nodes.some(n=>n.label.toLowerCase()===label.toLowerCase())) return null;
  const id="n"+(idSeq++);
  const kws=keywordsOf(label);
  const node={id,label,keywords:kws,ref, x: width/2+(Math.random()-.5)*40, y: height/2+(Math.random()-.5)*40};
  let linkCount=0;
  for(const o of nodes){
    if(linkCount>=3) break;
    const s=jaccard(kws,o.keywords);
    if(s>0.14){ links.push({source:o.id,target:id,ref:false}); linkCount++; }
  }
  if(parentId) links.push({source:parentId,target:id,ref:true});
  nodes.push(node);
  sim.nodes(nodes); sim.force("link").links(links);
  sim.alpha(Math.max(sim.alpha(),0.4)).restart();
  document.getElementById("emptyHint").style.display="none";
  updateProgress();
  logActivity(`${ref?"🟡 레퍼런스 추가":"🟣 키워드 추가"} · ${label}`);
  return node;
}

async function fetchWikiRelated(term){
  setStatus(`"${term}" 관련 항목 검색 중…`, true);
  try{
    const url=`https://ko.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(term)}&limit=5&namespace=0&format=json&origin=*`;
    const res=await fetch(url);
    const data=await res.json();
    return (data[1]||[]).filter(t=>t.toLowerCase()!==term.toLowerCase());
  }catch(e){
    setStatus(`네트워크 지연 — "${term}" 로컬 연관어로 대체`, false);
    const pool=new Set(); nodes.forEach(n=>n.keywords.forEach(k=>pool.add(k)));
    return [...pool].slice(0,3);
  }
}
async function fetchSummary(title){
  setStatus(`"${title}" 요약 불러오는 중…`, true);
  try{
    const url = `https://ko.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error("no summary");
    const data = await res.json();
    setStatus("대기 중", false);
    return { extract: data.extract || "요약을 찾지 못했어요.", source: data.content_urls?.desktop?.page || null };
  }catch(e){
    setStatus("대기 중", false);
    return { extract: "이 항목에 대한 요약을 찾지 못했어요.", source: null };
  }
}

async function expand(node){
  explored.add(node.id);
  const related = await fetchWikiRelated(node.label);
  const added = [];
  for(let i=0;i<Math.min(3,related.length);i++){
    const title = related[i];
    setStatus(`"${node.label}" 확장 중… (${i+1}/${Math.min(3,related.length)})`, true);
    if(isExcluded(title)) continue;
    if(reports[title] && reports[title].reported) continue; // skip flagged info
    const child = addNode(title, true, node.id);
    if(child){ queue.push(child); added.push(child); lastActivityTime=Date.now(); }
  }
  renderQueueList();
  setStatus(paused ? "일시정지됨" : "대기 중", false);
  return added;
}

function pickIdleContinuation(){
  // prefer a node we haven't expanded yet; fall back to any node (re-expanding is fine, addNode dedupes titles)
  const unexplored = nodes.filter(n=>!explored.has(n.id));
  const pool = unexplored.length ? unexplored : nodes;
  if(pool.length===0) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}

async function loop(){
  while(true){
    if(paused){ setStatus("일시정지됨", false); await sleep(300); continue; }
    if(!document.getElementById("autoSwitch").classList.contains("on")){ setStatus("자동 확장이 꺼져있어요", false); await sleep(300); continue; }
    if(nodes.length>=MAX_NODES){ setStatus("최대 노드 수(10,000개)에 도달했어요", false); await sleep(500); continue; }
    if(queue.length===0){
      if(nodes.length>0 && (Date.now()-lastActivityTime > IDLE_MS)){
        const pick = pickIdleContinuation();
        if(pick){
          setStatus(`새 키워드가 없어서 "${pick.label}"와 비슷한 항목으로 계속 확장할게요`, true);
          logActivity(`⏳ 유휴 자동 계속 · ${pick.label}`);
          lastActivityTime = Date.now();
          await sleep(600);
          await expand(pick);
          continue;
        }
      }
      setStatus("탐색 대기 중 — 새 키워드를 기다리는 중", false);
      await sleep(300); continue;
    }
    const next=queue.shift();
    renderQueueList();
    const speed = +document.getElementById("speedSlider").value;
    setStatus(`다음 확장까지 대기 중… "${next.label}"`, true);
    await sleep(speed);
    await expand(next);
  }
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ---------- queue / exclusion panel ---------- */
function renderQueueList(){
  document.getElementById("queueBadge").textContent = queue.length;
  const list = document.getElementById("queueList");
  list.innerHTML="";
  queue.slice(0,60).forEach(n=>{
    const el=document.createElement("div"); el.className="qItem";
    el.innerHTML=`<span class="lbl">${n.label}</span><span class="n">대기</span>`;
    list.appendChild(el);
  });
  if(queue.length>60){
    const more=document.createElement("div"); more.className="h"; more.style.textAlign="center";
    more.textContent=`+ ${queue.length-60}개 더`;
    list.appendChild(more);
  }
}
document.getElementById("queueBtn").onclick=()=>{
  document.getElementById("queuePanel").classList.toggle("show");
  renderQueueList(); renderExcludeChips();
};
function renderExcludeChips(){
  const box=document.getElementById("excludeChips");
  box.innerHTML="";
  exclusions.forEach((term,i)=>{
    const c=document.createElement("span"); c.className="exChip";
    c.innerHTML = `${term} <span class="x">✕</span>`;
    c.querySelector(".x").onclick=()=>{ exclusions.splice(i,1); saveExclusions(exclusions); renderExcludeChips(); };
    box.appendChild(c);
  });
}
document.getElementById("excludeInput").addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    const v=e.target.value.trim();
    if(v){ exclusions.push(v); saveExclusions(exclusions); renderExcludeChips(); e.target.value=""; }
  }
});

/* ---------- node detail panel ---------- */
async function selectNode(node){
  selectedNode = node;
  draw();
  const panel = document.getElementById("detailPanel");
  panel.classList.add("show");
  document.getElementById("detailTag").textContent = node.ref? "REFERENCE":"CORE";
  document.getElementById("detailTag").className = "tag "+(node.ref?"ref":"core");
  document.getElementById("detailTitle").textContent = node.label;
  document.getElementById("correctionBox").classList.remove("show");
  document.getElementById("reportArea").innerHTML = `<button class="reportBtn" id="reportBtn">🚩 이 정보가 틀렸어요 — 신고하기</button>
    <div id="correctionBox"><textarea id="correctionText" placeholder="정확한 정보를 입력해주세요. 다음부터는 이 내용이 대신 표시돼요."></textarea><button id="saveCorrection">저장</button></div>`;

  const rep = reports[node.label];
  if(rep && rep.reported){
    document.getElementById("detailExtract").innerHTML = `<div class="reportedBadge" style="margin-bottom:8px;">🚩 신고된 정보</div>` + (rep.correction ? rep.correction : "커뮤니티가 이 정보를 신고했어요. 아직 수정된 설명은 없어요.");
    document.getElementById("detailSource").textContent="";
  } else {
    document.getElementById("detailExtract").textContent="불러오는 중…";
    document.getElementById("detailSource").textContent="";
    const s = await fetchSummary(node.label);
    if(selectedNode!==node) return;
    document.getElementById("detailExtract").textContent = s.extract;
    document.getElementById("detailSource").innerHTML = s.source ? `출처: <a href="${s.source}" target="_blank" rel="noopener">위키백과에서 보기</a>` : "";
  }
  bindReportHandlers(node);
}
function bindReportHandlers(node){
  document.getElementById("reportBtn").onclick=()=>{
    document.getElementById("correctionBox").classList.add("show");
  };
  document.getElementById("saveCorrection").onclick=()=>{
    const text = document.getElementById("correctionText").value.trim();
    reports[node.label] = { reported:true, correction:text };
    saveReports(reports);
    logActivity(`🚩 신고/수정됨 · ${node.label}`);
    selectNode(node);
    draw();
  };
}
document.getElementById("closeDetail").onclick=()=>{
  document.getElementById("detailPanel").classList.remove("show");
  selectedNode=null; draw();
};

/* ---------- context menu (right-click / triple-click) ---------- */
const ctxMenu = document.getElementById("ctxMenu");
let ctxTarget = null;
function openContextMenu(node, x, y){
  ctxTarget = node;
  ctxMenu.style.left = Math.min(x, window.innerWidth-210)+"px";
  ctxMenu.style.top = Math.min(y, window.innerHeight-180)+"px";
  ctxMenu.classList.add("show");
}
function closeContextMenu(){ ctxMenu.classList.remove("show"); ctxTarget=null; }
document.addEventListener("click", e=>{ if(!ctxMenu.contains(e.target)) closeContextMenu(); });

function deleteNode(node){
  const idx = nodes.indexOf(node);
  if(idx===-1) return;
  nodes.splice(idx,1);
  links = links.filter(l => (l.source.id||l.source)!==node.id && (l.target.id||l.target)!==node.id);
  queue = queue.filter(n=>n.id!==node.id);
  explored.delete(node.id);
  sim.nodes(nodes); sim.force("link").links(links); sim.alpha(0.3).restart();
  renderQueueList(); updateProgress();
  logActivity(`🗑 삭제됨 · ${node.label}`);
  if(selectedNode===node){ selectedNode=null; document.getElementById("detailPanel").classList.remove("show"); }
  if(nodes.length===0) document.getElementById("emptyHint").style.display="flex";
  draw();
}

document.getElementById("ctxFindMore").onclick = async ()=>{
  if(!ctxTarget) return;
  const target = ctxTarget; closeContextMenu();
  logActivity(`🔎 수동으로 더 찾기 · ${target.label}`);
  lastActivityTime = Date.now();
  await expand(target);
};
document.getElementById("ctxEdit").onclick = async ()=>{
  if(!ctxTarget) return;
  const target = ctxTarget; closeContextMenu();
  await selectNode(target);
  document.getElementById("reportBtn").click();
  document.getElementById("correctionText").focus();
};
document.getElementById("ctxReport").onclick = async ()=>{
  if(!ctxTarget) return;
  const target = ctxTarget; closeContextMenu();
  reports[target.label] = reports[target.label] || { reported:true, correction:"" };
  reports[target.label].reported = true;
  saveReports(reports);
  logActivity(`🚩 오류 신고됨 · ${target.label}`);
  selectNode(target);
  draw();
};
document.getElementById("ctxDelete").onclick = ()=>{
  if(!ctxTarget) return;
  const target = ctxTarget; closeContextMenu();
  deleteNode(target);
};

/* ---------- keyboard shortcuts (Figma-style) ---------- */
document.addEventListener("keydown", e=>{
  const typing = ["INPUT","TEXTAREA"].includes(document.activeElement.tagName);
  if((e.key==="Delete"||e.key==="Backspace") && selectedNode && !typing){
    e.preventDefault(); deleteNode(selectedNode);
  } else if(e.key==="Escape"){
    closeContextMenu();
    document.getElementById("detailPanel").classList.remove("show");
    selectedNode=null; draw();
  } else if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="f"){
    e.preventDefault(); document.getElementById("kwInput").focus();
  } else if(!typing && (e.key==="+"||e.key==="=")){
    d3.select(canvas).transition().duration(200).call(d3.zoom().scaleBy, 1.3);
  } else if(!typing && e.key==="-"){
    d3.select(canvas).transition().duration(200).call(d3.zoom().scaleBy, 0.75);
  } else if(!typing && e.key==="0"){
    d3.select(canvas).transition().duration(300).call(d3.zoom().transform, d3.zoomIdentity);
  }
});

/* ---------- shortcuts help panel ---------- */
const shortcutBtn=document.getElementById("shortcutBtn");
const shortcutPanel=document.getElementById("shortcutPanel");
shortcutBtn.onclick=()=>shortcutPanel.classList.toggle("show");
document.addEventListener("click",e=>{ if(!shortcutPanel.contains(e.target) && e.target!==shortcutBtn) shortcutPanel.classList.remove("show"); });

/* ---------- input / controls ---------- */
document.getElementById("kwInput").addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    const val=e.target.value.trim();
    if(!val) return;
    e.target.value="";
    const n = addNode(val,false,null);
    if(n){ queue.push(n); renderQueueList(); lastActivityTime=Date.now(); }
  }
});
document.getElementById("autoSwitch").onclick=(e)=>e.currentTarget.classList.toggle("on");
document.getElementById("pauseBtn").onclick=(e)=>{
  paused=!paused;
  e.target.textContent = paused? "▶ 재개" : "⏸ 일시정지";
};

/* ---------- settings ---------- */
const settingsBtn=document.getElementById("settingsBtn");
const settingsPanel=document.getElementById("settingsPanel");
settingsBtn.onclick=()=>settingsPanel.classList.toggle("show");
document.addEventListener("click",e=>{ if(!settingsPanel.contains(e.target) && e.target!==settingsBtn) settingsPanel.classList.remove("show"); });
document.querySelectorAll("[data-theme-opt]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-theme-opt]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.body.dataset.theme=btn.dataset.themeOpt;
    draw();
  };
});
const accents=[["#6c5ce7","#e9e5fb"],["#2563eb","#dbeafe"],["#d84f6b","#fbe3e8"],["#0f9d58","#dcf3e5"],["#d89a3d","#faf0dd"]];
const swatchRow=document.getElementById("swatchRow");
accents.forEach((c,i)=>{
  const s=document.createElement("div"); s.className="swatch"+(i===0?" sel":"");
  s.style.background=c[0];
  s.onclick=()=>{
    document.querySelectorAll(".swatch").forEach(x=>x.classList.remove("sel")); s.classList.add("sel");
    document.documentElement.style.setProperty("--violet",c[0]);
    document.documentElement.style.setProperty("--violet-bg",c[1]);
    draw();
  };
  swatchRow.appendChild(s);
});

resize();
renderExcludeChips();
renderQueueList();
updateProgress();
renderActivityLog();
loop();
</script>
