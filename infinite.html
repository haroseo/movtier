<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MindWeb Infinite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root{
    --bg:#fafaf9; --panel:#ffffff; --border:#e8e6e1; --text:#1f1d1a; --muted:#8b8778;
    --violet:#6c5ce7; --violet-bg:#e9e5fb; --gold:#d89a3d; --gold-bg:#faf0dd;
    --font: "Pretendard","Inter",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  [data-theme="dark"]{ --bg:#17171b; --panel:#1e1e23; --border:#2c2c34; --text:#eeecee; --muted:#8f8d9b; --violet-bg:#2a2540; --gold-bg:#332a17; }
  [data-theme="mono"]{ --bg:#ffffff; --panel:#f2f2f2; --border:#d8d8d8; --text:#111111; --muted:#767676;
    --violet:#111111; --violet-bg:#eaeaea; --gold:#444444; --gold-bg:#eeeeee; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;}
  #topbar{height:72px;min-height:72px;border-bottom:1px solid var(--border);background:var(--panel);
    display:flex;align-items:center;gap:14px;padding:0 28px;}
  .brand{font-weight:700;color:var(--violet);display:flex;align-items:center;gap:8px;white-space:nowrap;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);}
  #kwInput{flex:1;border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13.5px;
    background:var(--bg);color:var(--text);font-family:var(--font);outline:none;}
  .pill{display:flex;align-items:center;gap:6px;padding:9px 15px;border-radius:999px;font-size:12.5px;font-weight:600;
    cursor:pointer;border:1px solid transparent;white-space:nowrap;font-family:var(--font);}
  .pill.violet{background:var(--violet-bg);color:var(--violet);}
  .pill.gold{background:var(--gold-bg);color:var(--gold);}
  .pill.ghost{background:var(--panel);color:var(--text);border-color:var(--border);}
  .toggle{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;}
  .switch{width:38px;height:22px;border-radius:11px;background:var(--border);position:relative;cursor:pointer;transition:.2s;}
  .switch.on{background:var(--violet);}
  .switch .knob{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:.2s;}
  .switch.on .knob{left:18px;}
  #settingsBtn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--panel);cursor:pointer;}

  #wrap{flex:1;position:relative;}
  svg{width:100%;height:100%;display:block;}
  .link{stroke:var(--violet);stroke-opacity:.28;stroke-width:1.3px;}
  .link.ref{stroke:var(--gold);stroke-opacity:.5;stroke-dasharray:3 3;}
  .node circle{cursor:pointer;stroke-width:1.5px;}
  .node.core circle{fill:var(--violet-bg);stroke:var(--violet);}
  .node.ref circle{fill:var(--gold-bg);stroke:var(--gold);}
  .node text{fill:var(--text);font-size:10.5px;font-family:var(--font);text-anchor:middle;pointer-events:none;}
  .node.selected circle{filter:drop-shadow(0 0 6px currentColor);}

  #stats{position:absolute;bottom:20px;left:20px;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;padding:10px 16px;font-size:12px;color:var(--muted);display:flex;gap:16px;}
  #stats b{color:var(--text);}
  #emptyHint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:13.5px;text-align:center;pointer-events:none;}

  #settingsPanel{position:absolute;top:80px;right:28px;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none;z-index:50;width:230px;}
  #settingsPanel.show{display:block;}
  #settingsPanel h4{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .swatchRow{display:flex;gap:8px;margin-bottom:16px;}
  .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:var(--text);}
  .themeRow{display:flex;gap:6px;margin-bottom:14px;}
  .themeRow button{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--bg);
    color:var(--text);cursor:pointer;font-size:11px;font-family:var(--font);}
  .themeRow button.active{background:var(--violet);color:#fff;border-color:var(--violet);}
  #speedRow input{width:100%;}
</style>
</head>
<body data-theme="light">

<div id="topbar">
  <div class="brand"><span class="dot"></span>무한증식</div>
  <input id="kwInput" placeholder="키워드를 입력하면 위키백과 레퍼런스를 따라 계속 확장돼요… (Enter)">
  <div class="toggle">자동 확장 <div class="switch on" id="autoSwitch"><div class="knob"></div></div></div>
  <button class="pill gold" id="pauseBtn">⏸ 일시정지</button>
  <button id="settingsBtn">⚙</button>
</div>

<div id="wrap">
  <svg></svg>
  <div id="emptyHint">키워드를 입력하면 위키백과를 따라 자동으로 그래프가 자라나요.</div>
  <div id="stats">
    <div>노드 <b id="nodeCount">0</b></div>
    <div>탐색 대기 <b id="queueCount">0</b></div>
    <div id="statusMsg" style="color:var(--gold)"></div>
  </div>
</div>

<div id="settingsPanel">
  <h4>테마</h4>
  <div class="themeRow">
    <button data-theme-opt="light" class="active">라이트</button>
    <button data-theme-opt="dark">다크</button>
    <button data-theme-opt="mono">흑백</button>
  </div>
  <h4>강조 색상</h4>
  <div class="swatchRow" id="swatchRow"></div>
  <h4>확장 속도</h4>
  <div id="speedRow"><input type="range" id="speedSlider" min="400" max="3000" value="1200"></div>
</div>

<script>
const STOP = new Set(["그리고","그런","이런","것","수","등","의","을","를","이","가","은","는","에","와","과","도","로","으로","에서","및","the","and","of","to","in","for","a","an","with","on","은는"]);
function keywordsOf(str){
  return [...new Set(str.replace(/[,.!?/\\()\[\]{}"'\n]/g," ").split(/\s+/)
    .map(w=>w.trim()).filter(w=>w.length>1 && !STOP.has(w.toLowerCase())))].slice(0,8);
}
function jaccard(a,b){
  const sa=new Set(a.map(x=>x.toLowerCase())), sb=new Set(b.map(x=>x.toLowerCase()));
  if(!sa.size||!sb.size) return 0;
  let inter=0; sa.forEach(x=>{if(sb.has(x))inter++;});
  return inter/new Set([...sa,...sb]).size;
}

let nodes=[], links=[], idSeq=0, queue=[], running=false, paused=false;
const MAX_NODES = 400; // safety cap so the browser tab doesn't choke — conceptually unlimited

const svg=d3.select("svg");
const g=svg.append("g");
svg.call(d3.zoom().scaleExtent([.2,3]).on("zoom",e=>g.attr("transform",e.transform)));
let width,height;
function resize(){ const r=document.getElementById("wrap").getBoundingClientRect(); width=r.width;height=r.height; svg.attr("viewBox",[0,0,width,height]); }
window.addEventListener("resize",resize); resize();

const sim=d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(d=>d.ref?55:95).strength(.55))
  .force("charge", d3.forceManyBody().strength(-160))
  .force("center", d3.forceCenter())
  .force("collide", d3.forceCollide().radius(d=>d.ref?16:24))
  .on("tick", ticked);
let linkSel=g.append("g").selectAll("line");
let nodeSel=g.append("g").selectAll("g");
function ticked(){
  linkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
}
function render(){
  document.getElementById("emptyHint").style.display = nodes.length===0 ? "flex" : "none";
  sim.force("center").x(width/2).y(height/2);
  linkSel=g.select("g:nth-child(1)").selectAll("line").data(links,d=>(d.source.id||d.source)+"-"+(d.target.id||d.target));
  linkSel.exit().remove();
  linkSel=linkSel.enter().append("line").attr("class",d=>d.ref?"link ref":"link").merge(linkSel);
  nodeSel=g.select("g:nth-child(2)").selectAll("g").data(nodes,d=>d.id);
  nodeSel.exit().remove();
  const enter=nodeSel.enter().append("g").attr("class",d=>"node "+(d.ref?"ref":"core"))
    .call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.25).restart();d.fx=d.x;d.fy=d.y;})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  enter.append("circle").attr("r",d=>d.ref?12:22);
  enter.append("text").attr("dy",d=>(d.ref?12:22)+13).text(d=>d.label.length>9?d.label.slice(0,9)+"…":d.label);
  nodeSel=enter.merge(nodeSel);
  sim.nodes(nodes); sim.force("link").links(links); sim.alpha(.8).restart();
  document.getElementById("nodeCount").textContent=nodes.length;
  document.getElementById("queueCount").textContent=queue.length;
}

function addNode(label, ref, parentId){
  if(nodes.length>=MAX_NODES) return null;
  if(nodes.some(n=>n.label.toLowerCase()===label.toLowerCase())) return null;
  const id="n"+(idSeq++);
  const kws=keywordsOf(label);
  const node={id,label,keywords:kws,ref};
  nodes.forEach(o=>{ const s=jaccard(kws,o.keywords); if(s>0.12) links.push({source:o.id,target:id,ref:false}); });
  if(parentId) links.push({source:parentId,target:id,ref:true});
  nodes.push(node);
  return node;
}

async function fetchWikiRelated(term){
  try{
    const url=`https://ko.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(term)}&limit=5&namespace=0&format=json&origin=*`;
    const res=await fetch(url);
    const data=await res.json();
    return (data[1]||[]).filter(t=>t.toLowerCase()!==term.toLowerCase());
  }catch(e){
    document.getElementById("statusMsg").textContent="네트워크 지연 — 로컬 연관어로 대체 중";
    const pool=new Set(); nodes.forEach(n=>n.keywords.forEach(k=>pool.add(k)));
    return [...pool].slice(0,3);
  }
}

async function expand(node){
  if(paused) { queue.push(node); return; }
  const related = await fetchWikiRelated(node.label);
  for(const title of related.slice(0,3)){
    const child = addNode(title, true, node.id);
    if(child) queue.push(child);
  }
  render();
}

async function loop(){
  if(running) return;
  running=true;
  while(true){
    if(paused || queue.length===0 || nodes.length>=MAX_NODES){ await sleep(300); if(!document.getElementById("autoSwitch").classList.contains("on") && !paused){ /* still idle */ } if(queue.length===0 && paused===false){ /* nothing to do, keep loop alive lightly */ } continue; }
    const next=queue.shift();
    const speed = +document.getElementById("speedSlider").value;
    await sleep(speed);
    if(document.getElementById("autoSwitch").classList.contains("on")){
      await expand(next);
    }
  }
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

document.getElementById("kwInput").addEventListener("keydown", async e=>{
  if(e.key==="Enter"){
    const val=e.target.value.trim();
    if(!val) return;
    e.target.value="";
    const n = addNode(val,false,null);
    render();
    if(n){ queue.push(n); document.getElementById("statusMsg").textContent=""; }
  }
});

document.getElementById("autoSwitch").onclick=(e)=>{ e.currentTarget.classList.toggle("on"); };
document.getElementById("pauseBtn").onclick=(e)=>{
  paused=!paused;
  e.target.textContent = paused? "▶ 재개" : "⏸ 일시정지";
};

// settings
const settingsBtn=document.getElementById("settingsBtn");
const settingsPanel=document.getElementById("settingsPanel");
settingsBtn.onclick=()=>settingsPanel.classList.toggle("show");
document.addEventListener("click",e=>{ if(!settingsPanel.contains(e.target) && e.target!==settingsBtn) settingsPanel.classList.remove("show"); });
document.querySelectorAll("[data-theme-opt]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-theme-opt]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.body.dataset.theme=btn.dataset.themeOpt;
  };
});
const accents=[["#6c5ce7","#e9e5fb"],["#2563eb","#dbeafe"],["#d84f6b","#fbe3e8"],["#0f9d58","#dcf3e5"],["#d89a3d","#faf0dd"]];
const swatchRow=document.getElementById("swatchRow");
accents.forEach((c,i)=>{
  const s=document.createElement("div"); s.className="swatch"+(i===0?" sel":"");
  s.style.background=c[0];
  s.onclick=()=>{
    document.querySelectorAll(".swatch").forEach(x=>x.classList.remove("sel")); s.classList.add("sel");
    document.documentElement.style.setProperty("--violet",c[0]);
    document.documentElement.style.setProperty("--violet-bg",c[1]);
  };
  swatchRow.appendChild(s);
});

// starts empty — waits for the user's first keyword
render();
loop();
</script>
</body>
</html>
