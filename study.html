<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MindWeb Study</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<style>
  :root{
    --bg:#ffffff; --panel:#f7f6f3; --panel2:#ffffff; --border:#e8e6e1;
    --text:#1f1d1a; --muted:#8b8778;
    --violet:#6c5ce7; --violet-bg:#e9e5fb;
    --gold:#d89a3d; --gold-bg:#faf0dd;
    --green:#38a06b; --green-bg:#e0f3e8;
    --radius:12px;
    --font: "Pretendard","Inter",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  [data-theme="dark"]{
    --bg:#17171b; --panel:#1e1e23; --panel2:#232329; --border:#2c2c34;
    --text:#eeeceE; --muted:#8f8d9b; --violet-bg:#2a2540; --gold-bg:#332a17; --green-bg:#173324;
  }
  [data-theme="mono"]{
    --bg:#ffffff; --panel:#f2f2f2; --panel2:#ffffff; --border:#d8d8d8;
    --text:#111111; --muted:#767676;
    --violet:#111111; --violet-bg:#eaeaea; --gold:#444444; --gold-bg:#eeeeee; --green:#222222; --green-bg:#ececec;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;font-size:14px;}
  ::-webkit-scrollbar{width:8px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  #sidebar{width:280px;min-width:280px;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:24px 18px;gap:16px;}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--violet);font-size:15px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);}
  .tabs{display:flex;gap:6px;}
  .tabs button{flex:1;padding:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text);
    border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;font-family:var(--font);}
  .tabs button.active{background:var(--violet);color:#fff;border-color:var(--violet);}
  #search{padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);
    color:var(--text);font-size:13px;font-family:var(--font);}
  #search::placeholder{color:var(--muted);}
  .sec-label{font-size:11px;color:var(--muted);font-weight:600;margin-top:4px;}
  #noteList{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
  .noteItem{padding:10px 12px;border-radius:8px;cursor:pointer;background:var(--panel2);border:1px solid transparent;}
  .noteItem:hover{border-color:var(--border);}
  .noteItem.sel{background:var(--violet-bg);}
  .noteItem .t{font-weight:600;font-size:13px;margin-bottom:2px;}
  .noteItem .m{font-size:11px;color:var(--muted);}
  #newNoteBtn{padding:10px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--muted);
    cursor:pointer;font-family:var(--font);font-size:12.5px;}
  #newNoteBtn:hover{color:var(--violet);border-color:var(--violet);}

  #main{flex:1;display:flex;flex-direction:column;min-width:0;}
  #topbar{height:64px;min-height:64px;border-bottom:1px solid var(--border);display:flex;align-items:center;
    gap:12px;padding:0 24px;background:var(--panel2);}
  #topbar input#noteTitle{flex:1;border:none;outline:none;font-size:18px;font-weight:700;font-family:var(--font);
    background:transparent;color:var(--text);}
  .pill{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;font-size:12px;font-weight:600;
    cursor:pointer;border:1px solid transparent;white-space:nowrap;font-family:var(--font);}
  .pill.gold{background:var(--gold-bg);color:var(--gold);}
  .pill.violet{background:var(--violet-bg);color:var(--violet);}
  .pill.ghost{background:var(--panel);color:var(--text);border-color:var(--border);}
  .pill.on{outline:2px solid currentColor;}

  #body{flex:1;display:flex;min-height:0;}
  #view{flex:1;display:flex;flex-direction:column;padding:24px;overflow:auto;}
  #noteEditor{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:24px;background:var(--panel2);
    outline:none;font-size:14.5px;line-height:1.8;overflow-y:auto;}
  #noteEditor:empty:before{content:"내용을 입력하거나 사진 촬영으로 자동으로 채워보세요…";color:var(--muted);}
  #graphWrap{flex:1;position:relative;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg);}
  svg{width:100%;height:100%;display:block;}
  .link{stroke:var(--violet);stroke-opacity:.3;stroke-width:1.4px;}
  .link.ref{stroke:var(--gold);stroke-opacity:.5;stroke-dasharray:3 3;}
  .node circle{cursor:pointer;stroke-width:1.5px;}
  .node.core circle{fill:var(--violet-bg);stroke:var(--violet);}
  .node.ref circle{fill:var(--gold-bg);stroke:var(--gold);}
  .node text{fill:var(--text);font-size:11px;font-family:var(--font);text-anchor:middle;pointer-events:none;}

  #linked{width:280px;min-width:280px;border-left:1px solid var(--border);background:var(--panel);
    padding:24px 18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
  #linked .h{font-size:12.5px;font-weight:700;color:var(--muted);}
  .chip{display:inline-flex;padding:6px 12px;border-radius:999px;background:var(--violet-bg);color:var(--violet);
    font-size:12px;font-weight:600;margin:3px 4px 0 0;}
  #linkedHint{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:8px;}

  /* settings */
  #settingsBtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);
    cursor:pointer;font-size:15px;color:var(--text);}
  #settingsPanel{position:absolute;top:60px;right:24px;background:var(--panel2);border:1px solid var(--border);
    border-radius:12px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none;z-index:50;width:220px;}
  #settingsPanel.show{display:block;}
  #settingsPanel h4{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .swatchRow{display:flex;gap:8px;margin-bottom:16px;}
  .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:var(--text);}
  .themeRow{display:flex;gap:6px;}
  .themeRow button{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--panel);
    color:var(--text);cursor:pointer;font-size:11.5px;font-family:var(--font);}
  .themeRow button.active{background:var(--violet);color:#fff;border-color:var(--violet);}

  #ocrOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;}
  #ocrOverlay.show{display:flex;}
  #ocrBox{background:var(--panel2);border-radius:16px;padding:28px;width:420px;text-align:center;}
  #ocrBox input{margin:14px 0;}
  #ocrStatus{font-size:12.5px;color:var(--muted);margin-top:10px;font-family:var(--font);}
  #ocrBox button.cancel{margin-top:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--font);}
</style>
</head>
<body data-theme="light">

<div id="sidebar">
  <div class="brand"><span class="dot"></span>MindWeb Study</div>
  <div class="tabs">
    <button id="tabNotes" class="active">노트</button>
    <button id="tabGraph">마인드맵</button>
  </div>
  <input id="search" placeholder="검색…">
  <div class="sec-label">최근 노트</div>
  <div id="noteList"></div>
  <button id="newNoteBtn">+ 새 노트</button>
</div>

<div id="main">
  <div id="topbar">
    <input id="noteTitle" value="">
    <button class="pill gold" id="ocrBtn">📷 사진으로 추가</button>
    <button class="pill violet on" id="syncBtn">↻ 마인드맵과 동기화</button>
    <button id="settingsBtn">⚙</button>
  </div>
  <div id="body">
    <div id="view">
      <div id="noteEditor" contenteditable="true"></div>
      <div id="graphWrap" style="display:none;">
        <svg></svg>
        <div id="graphEmpty" style="position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;pointer-events:none;">동기화된 노트가 없어요.<br>노트를 만들고 동기화를 켜면 여기에 노드로 나타나요.</div>
      </div>
    </div>
    <div id="linked">
      <div class="h">🔗 연결된 마인드맵 노드</div>
      <div id="chips"></div>
      <div id="linkedHint">동기화가 켜져있으면 이 노트의 키워드가 자동으로 마인드맵 노드와 연결돼요. 끄면 이 노트는 독립적으로 남아요.</div>
    </div>
  </div>
</div>

<div id="settingsPanel">
  <h4>테마</h4>
  <div class="themeRow">
    <button data-theme-opt="light" class="active">라이트</button>
    <button data-theme-opt="dark">다크</button>
    <button data-theme-opt="mono">흑백</button>
  </div>
  <h4 style="margin-top:16px;">강조 색상</h4>
  <div class="swatchRow" id="swatchRow"></div>
</div>

<div id="ocrOverlay">
  <div id="ocrBox">
    <div style="font-weight:700;margin-bottom:6px;">📷 사진에서 텍스트 읽기</div>
    <div style="font-size:12.5px;color:var(--muted);">이미지를 올리면 AI 없이 OCR 엔진이 텍스트만 추출해서 노트로 정리해줘요.</div>
    <input type="file" id="ocrFile" accept="image/*">
    <div id="ocrStatus"></div>
    <button class="cancel" id="ocrCancel">닫기</button>
  </div>
</div>

<script>
const STOP = new Set(["그리고","그런","이런","것","수","등","의","을","를","이","가","은","는","에","와","과","도","로","으로","에서","및","the","and","of","to","in","for","a","an","with"]);
function keywordsOf(str){
  return [...new Set(str.replace(/[,.!?/\\()\[\]{}"'\n]/g," ").split(/\s+/)
    .map(w=>w.trim()).filter(w=>w.length>1 && !STOP.has(w.toLowerCase())))].slice(0,10);
}
function jaccard(a,b){
  const sa=new Set(a.map(x=>x.toLowerCase())), sb=new Set(b.map(x=>x.toLowerCase()));
  if(!sa.size||!sb.size) return 0;
  let inter=0; sa.forEach(x=>{if(sb.has(x))inter++;});
  return inter/new Set([...sa,...sb]).size;
}

const LS_NOTES = "mindweb_study_notes";
function loadNotesFromStorage(){
  try{
    const raw = JSON.parse(localStorage.getItem(LS_NOTES) || "null");
    if(raw && Array.isArray(raw.notes)) return raw;
  }catch(e){}
  return {notes:[], idSeq:0};
}
function saveNotesToStorage(){
  localStorage.setItem(LS_NOTES, JSON.stringify({notes, idSeq}));
}

const _stored = loadNotesFromStorage();
let notes = _stored.notes;
let selectedNote = notes.length ? notes[0].id : null;
let idSeq = _stored.idSeq;
let nodes=[], links=[];

function renderNoteList(){
  const list=document.getElementById("noteList");
  list.innerHTML="";
  if(notes.length===0){
    list.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:8px 2px;">아직 노트가 없어요.<br>아래에서 새 노트를 만들거나 사진으로 추가해보세요.</div>`;
    return;
  }
  notes.forEach(n=>{
    const el=document.createElement("div");
    el.className="noteItem"+(n.id===selectedNote?" sel":"");
    el.innerHTML=`<div class="t">${n.title||"제목 없음"}</div><div class="m">${n.synced?"🔗 동기화됨":"독립 노트"}</div>`;
    el.onclick=()=>{ saveCurrentNote(); selectedNote=n.id; loadNote(); };
    const del=document.createElement("span");
    del.textContent="✕"; del.title="노트 삭제";
    del.style.cssText="position:absolute;top:8px;right:8px;color:var(--muted);font-size:11px;cursor:pointer;display:none;";
    el.style.position="relative";
    el.appendChild(del);
    el.addEventListener("mouseenter",()=>del.style.display="block");
    el.addEventListener("mouseleave",()=>del.style.display="none");
    del.onclick=(ev)=>{
      ev.stopPropagation();
      if(!confirm(`"${n.title||'제목 없음'}" 노트를 삭제할까요?`)) return;
      notes = notes.filter(x=>x.id!==n.id);
      if(selectedNote===n.id) selectedNote = notes.length ? notes[0].id : null;
      saveNotesToStorage();
      loadNote();
    };
    list.appendChild(el);
  });
}
function saveCurrentNote(){
  const n = notes.find(n=>n.id===selectedNote);
  if(!n) return;
  n.title = document.getElementById("noteTitle").value;
  n.body = document.getElementById("noteEditor").innerText;
  saveNotesToStorage();
}
function loadNote(){
  const n = notes.find(n=>n.id===selectedNote);
  const titleInput = document.getElementById("noteTitle");
  const editor = document.getElementById("noteEditor");
  if(!n){
    titleInput.value="";
    titleInput.placeholder="+ 새 노트를 만들어보세요";
    editor.innerText="";
    editor.contentEditable="false";
    document.getElementById("syncBtn").classList.remove("on");
    renderNoteList();
    document.getElementById("chips").innerHTML=`<div style="font-size:12px;color:var(--muted)">노트를 만들면 여기에 연결된 마인드맵 노드가 표시돼요.</div>`;
    return;
  }
  editor.contentEditable="true";
  titleInput.value = n.title;
  editor.innerText = n.body;
  document.getElementById("syncBtn").classList.toggle("on", n.synced);
  renderNoteList();
  renderChips(n);
}
function renderChips(n){
  const box=document.getElementById("chips");
  box.innerHTML="";
  if(!n.synced){ box.innerHTML=`<div style="font-size:12px;color:var(--muted)">이 노트는 마인드맵과 분리되어 있어요.</div>`; return; }
  keywordsOf(n.title+" "+n.body).forEach(k=>{
    const c=document.createElement("span"); c.className="chip"; c.textContent="#"+k; box.appendChild(c);
  });
}

function createNote(){
  saveCurrentNote();
  const id="note"+(idSeq++ + 100);
  notes.unshift({id,title:"새 노트",body:"",synced:true});
  selectedNote=id;
  saveNotesToStorage();
  loadNote();
  document.getElementById("noteTitle").focus();
}
document.getElementById("newNoteBtn").onclick=createNote;
document.addEventListener("keydown", e=>{
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="n"){ e.preventDefault(); createNote(); }
});
document.getElementById("noteTitle").addEventListener("input", saveCurrentNote);
document.getElementById("noteEditor").addEventListener("input", ()=>{ saveCurrentNote(); const n=notes.find(n=>n.id===selectedNote); if(n) renderChips(n); });
document.getElementById("syncBtn").onclick=(e)=>{
  const n = notes.find(n=>n.id===selectedNote);
  if(!n) return;
  n.synced = !n.synced;
  saveNotesToStorage();
  e.target.classList.toggle("on", n.synced);
  renderNoteList(); renderChips(n);
};

// tabs
document.getElementById("tabNotes").onclick=()=>{
  document.getElementById("tabNotes").classList.add("active");
  document.getElementById("tabGraph").classList.remove("active");
  document.getElementById("noteEditor").parentElement.style.display=""; // view still contains both
  document.getElementById("noteEditor").style.display="block";
  document.getElementById("graphWrap").style.display="none";
};
document.getElementById("tabGraph").onclick=()=>{
  document.getElementById("tabGraph").classList.add("active");
  document.getElementById("tabNotes").classList.remove("active");
  document.getElementById("noteEditor").style.display="none";
  document.getElementById("graphWrap").style.display="block";
  syncGraphFromNotes();
};

// build mindmap nodes from synced notes
function syncGraphFromNotes(){
  nodes=[]; links=[];
  let gid=0;
  notes.filter(n=>n.synced).forEach(n=>{
    const kws = keywordsOf(n.title+" "+n.body);
    const node = {id:"g"+(gid++), label:n.title, keywords:kws, ref:false};
    nodes.forEach(other=>{
      const score = jaccard(kws, other.keywords);
      if(score>0.1) links.push({source:other.id, target:node.id, ref:false});
    });
    nodes.push(node);
  });
  renderGraph();
}

const svg=d3.select("svg");
const g=svg.append("g");
svg.call(d3.zoom().scaleExtent([.3,2.5]).on("zoom",e=>g.attr("transform",e.transform)));
let width,height;
function resize(){ const r=document.getElementById("graphWrap").getBoundingClientRect(); width=r.width;height=r.height; svg.attr("viewBox",[0,0,width,height]); }
window.addEventListener("resize",resize);

const sim=d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(100).strength(.5))
  .force("charge", d3.forceManyBody().strength(-220))
  .force("center", d3.forceCenter())
  .force("collide", d3.forceCollide().radius(34))
  .on("tick", ticked);
let linkSel=g.append("g").selectAll("line");
let nodeSel=g.append("g").selectAll("g");
function ticked(){
  linkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
}
function renderGraph(){
  resize();
  document.getElementById("graphEmpty").style.display = nodes.length===0 ? "flex" : "none";
  sim.force("center").x(width/2).y(height/2);
  linkSel=g.select("g:nth-child(1)").selectAll("line").data(links,d=>(d.source.id||d.source)+"-"+(d.target.id||d.target));
  linkSel.exit().remove();
  linkSel=linkSel.enter().append("line").attr("class",d=>d.ref?"link ref":"link").merge(linkSel);
  nodeSel=g.select("g:nth-child(2)").selectAll("g").data(nodes,d=>d.id);
  nodeSel.exit().remove();
  const enter=nodeSel.enter().append("g").attr("class",d=>"node "+(d.ref?"ref":"core"))
    .call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  enter.append("circle").attr("r",22);
  enter.append("text").attr("dy",36).text(d=>d.label.length>10?d.label.slice(0,10)+"…":d.label);
  nodeSel=enter.merge(nodeSel);
  sim.nodes(nodes); sim.force("link").links(links); sim.alpha(.8).restart();
}

// settings
const settingsBtn=document.getElementById("settingsBtn");
const settingsPanel=document.getElementById("settingsPanel");
settingsBtn.onclick=()=>settingsPanel.classList.toggle("show");
document.addEventListener("click",e=>{ if(!settingsPanel.contains(e.target) && e.target!==settingsBtn) settingsPanel.classList.remove("show"); });
document.querySelectorAll("[data-theme-opt]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-theme-opt]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.body.dataset.theme = btn.dataset.themeOpt;
  };
});
const accents = [["#6c5ce7","#e9e5fb"],["#2563eb","#dbeafe"],["#d84f6b","#fbe3e8"],["#0f9d58","#dcf3e5"],["#d89a3d","#faf0dd"]];
const swatchRow=document.getElementById("swatchRow");
accents.forEach((c,i)=>{
  const s=document.createElement("div"); s.className="swatch"+(i===0?" sel":"");
  s.style.background=c[0];
  s.onclick=()=>{
    document.querySelectorAll(".swatch").forEach(x=>x.classList.remove("sel")); s.classList.add("sel");
    document.documentElement.style.setProperty("--violet",c[0]);
    document.documentElement.style.setProperty("--violet-bg",c[1]);
  };
  swatchRow.appendChild(s);
});

// OCR capture (client-side, no AI — Tesseract.js text recognition engine)
const ocrBtn=document.getElementById("ocrBtn");
const ocrOverlay=document.getElementById("ocrOverlay");
ocrBtn.onclick=()=>ocrOverlay.classList.add("show");
document.getElementById("ocrCancel").onclick=()=>ocrOverlay.classList.remove("show");
document.getElementById("ocrFile").addEventListener("change", async (e)=>{
  const file=e.target.files[0];
  if(!file) return;
  const status=document.getElementById("ocrStatus");
  status.textContent="이미지에서 텍스트를 읽는 중…";
  try{
    const {data:{text}} = await Tesseract.recognize(file, 'kor+eng', {
      logger: m => { if(m.status==='recognizing text') status.textContent = `텍스트 인식 중… ${Math.round(m.progress*100)}%`; }
    });
    const clean = text.trim();
    saveCurrentNote();
    const id="note"+(idSeq++ + 200);
    const title = clean.split("\n")[0].slice(0,30) || "사진에서 가져온 노트";
    notes.unshift({id, title, body:clean, synced:true});
    selectedNote=id;
    saveNotesToStorage();
    loadNote();
    status.textContent="완료! 노트로 정리했어요.";
    setTimeout(()=>ocrOverlay.classList.remove("show"),700);
  }catch(err){
    status.textContent="텍스트를 읽지 못했어요. 더 선명한 사진으로 시도해보세요.";
  }
});

loadNote();
resize();
</script>
</body>
</html>
